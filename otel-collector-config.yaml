receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8888']

processors:
  batch:
    send_batch_size: 100
    timeout: 10s

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  attributes:
    actions:
      - key: service.name
        value: stam-front
        action: insert
      - key: environment
        value: development
        action: insert

  resourcedetection:
    detectors: [system, docker]

exporters:
  # Prometheus exporter for metrics
  prometheus:
    endpoint: '0.0.0.0:8889'

  # OTLP exporter for traces to Tempo
  otlp/tempo:
    endpoint: tempo:4317

  # Logging exporter for debugging
  logging:
    loglevel: debug

  # Loki exporter for logs
  otlphttp/loki:
    endpoint: http://loki:3100/loki/api/v1/otel

service:
  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes, resourcedetection]
      exporters: [otlp/tempo, logging]

    # Metrics pipeline
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, attributes]
      exporters: [prometheus, logging]

    # Logs pipeline
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [logging, otlphttp/loki]

  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
