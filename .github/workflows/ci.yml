name: Angular CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  ci-stam-front:
    runs-on: ubuntu-24.04
    env:
      CI_REGISTRY_IMAGE: ghcr.io/angular-epita/stam-front
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Sauvegarder l'application compilée (Artéfact)
        uses: actions/upload-artifact@v4
        with:
          name: stam-front
          path: dist/stam-front/
          retention-days: 30

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push Docker image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$GITHUB_SHA .
          docker push $CI_REGISTRY_IMAGE:latest
          docker push $CI_REGISTRY_IMAGE:$GITHUB_SHA

      - name: Build + push Docker image (main + version)
        if: github.ref == 'refs/heads/main'
        run: |
          export VERSION=$(node -p "require('./package.json').version")
          export CONTAINER_RELEASE_IMAGE=$CI_REGISTRY_IMAGE:$VERSION
          docker build -t $CONTAINER_RELEASE_IMAGE -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$GITHUB_SHA .
          docker push $CI_REGISTRY_IMAGE:latest
          docker push $CONTAINER_RELEASE_IMAGE
          docker push $CI_REGISTRY_IMAGE:$GITHUB_SHA

  release:
    needs: ci-stam-front
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: git config
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
