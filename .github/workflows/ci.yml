name: Angular CI & Auto-Release

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    
    env:
      CI_REGISTRY_IMAGE: ghcr.io/angular-epita/stam-front

    steps:
      - name: Générer le token de la GitHub App
        id: app-token
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Si on est sur main, on utilise le super-token pour avoir le droit d'écrire
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # --- 2. SETUP & VÉRIFICATIONS ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install, Lint & Build
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- 3. DOCKER SUR DEVELOP (Pas de versioning) ---
      - name: Push Docker (Develop)
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        run: |
          docker build -t $CI_REGISTRY_IMAGE:develop -t $CI_REGISTRY_IMAGE:${{ github.sha }} .
          docker push $CI_REGISTRY_IMAGE:develop
          docker push $CI_REGISTRY_IMAGE:${{ github.sha }}

      # --- 4. AUTO-RELEASE SUR MAIN (Bypass Ruleset) ---
      - name: Configurer Git pour Release Bot
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Lancer npm run release (Bump version + Tag)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- 5. DOCKER SUR MAIN (Avec la nouvelle version !) ---
      - name: Push Docker (Main / Prod)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # On lit la TOUTE NOUVELLE version générée par l'étape précédente dans le package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "Nouvelle version lue : $VERSION"
          
          docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:v$VERSION -t $CI_REGISTRY_IMAGE:${{ github.sha }} .
          docker push $CI_REGISTRY_IMAGE:latest
          docker push $CI_REGISTRY_IMAGE:v$VERSION
          docker push $CI_REGISTRY_IMAGE:${{ github.sha }}