name: Angular CI & Auto-Release

on:
  push:
    branches: ["main", "develop", "feature/**", "feat/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ============================================================
  # JOB 1 — CI (Intégration Continue)
  # S'exécute sur TOUTES les branches (feature, develop, main)
  # ============================================================
  ci:
    name: "CI — Lint, Build & Test"
    runs-on: ubuntu-24.04
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
    permissions:
      contents: read

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install, Lint & Build
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Unit Tests
        run: npx ng test --watch=false --browsers=ChromeHeadless

  # ============================================================
  # JOB 2 — CD (Déploiement Continu)
  # S'exécute UNIQUEMENT sur les branches longues (develop, main)
  # après succès du job CI
  # ============================================================
  cd:
    name: "CD — Docker & Release"
    needs: ci
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    env:
      CI_REGISTRY_IMAGE: ghcr.io/angular-epita/stam-front
    permissions:
      contents: write
      packages: write

    steps:
      - name: Générer le token de la GitHub App
        id: app-token
        if: github.ref == 'refs/heads/main'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Unit Tests
        run: npx ng test --watch=false --browsers=ChromeHeadless

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- DOCKER SUR DEVELOP ---
      - name: Push Docker (Develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          docker build -t $CI_REGISTRY_IMAGE:develop -t $CI_REGISTRY_IMAGE:${{ github.sha }} .
          docker push $CI_REGISTRY_IMAGE:develop
          docker push $CI_REGISTRY_IMAGE:${{ github.sha }}

      # --- AUTO-RELEASE SUR MAIN (release-it) ---
      - name: Configurer Git pour le Bot
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Lancer release-it
        if: github.ref == 'refs/heads/main'
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # --- DOCKER SUR MAIN (Avec la NOUVELLE version) ---
      - name: Push Docker (Main / Prod)
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Nouvelle version pour Docker : $VERSION"
          
          docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:v$VERSION -t $CI_REGISTRY_IMAGE:${{ github.sha }} .
          docker push $CI_REGISTRY_IMAGE:latest
          docker push $CI_REGISTRY_IMAGE:v$VERSION
          docker push $CI_REGISTRY_IMAGE:${{ github.sha }}
