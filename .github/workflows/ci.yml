name: Angular CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  ci-stam-front:
    runs-on: ubuntu-24.04
    env:
      CI_REGISTRY_IMAGE: ghcr.io/angular-epita/stam-front
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Sauvegarder l'application compilée (Artéfact)
        uses: actions/upload-artifact@v4
        with:
          name: stam-front
          path: dist/stam-front/
          retention-days: 30

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push Docker image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$GITHUB_SHA .
          docker push $CI_REGISTRY_IMAGE:latest
          docker push $CI_REGISTRY_IMAGE:$GITHUB_SHA

      - name: Build + push Docker image (main + version)
        if: github.ref == 'refs/heads/main'
        run: |
          export VERSION=$(node -p "require('./package.json').version")
          export CONTAINER_RELEASE_IMAGE=$CI_REGISTRY_IMAGE:$VERSION
          docker build -t $CONTAINER_RELEASE_IMAGE -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$GITHUB_SHA .
          docker push $CI_REGISTRY_IMAGE:latest
          docker push $CONTAINER_RELEASE_IMAGE
          docker push $CI_REGISTRY_IMAGE:$GITHUB_SHA

  release:
    needs: ci-stam-front
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    permissions:
      contents: read
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout with GitHub App token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          
