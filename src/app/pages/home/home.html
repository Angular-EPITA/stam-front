<!-- En-tête de la page -->
<section class="px-4 py-12 text-center">
  <h1 class="text-4xl font-bold tracking-tight text-slate-100">🎮 STAM</h1>
</section>

<!-- Grille des 10 derniers jeux -->
<section class="mx-auto max-w-6xl px-4 pb-12">
  <h2 class="mb-6 text-xl font-semibold text-slate-100">Derniers jeux ajoutés</h2>

  <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
    <!-- Boucle sur chaque jeu pour créer une carte -->
    @for (game of games; track game.id) {
    <div class="overflow-hidden rounded-lg bg-slate-800 transition hover:-translate-y-1 hover:shadow-lg">
      <img class="h-52 w-full object-cover" [src]="game.imageUrl" [alt]="game.title" />
      <div class="p-4">
        <h3 class="mb-2 text-base font-semibold text-slate-100">{{ game.title }}</h3>
        <div class="flex flex-wrap items-center gap-2 text-xs">
          <span class="inline-flex items-center rounded bg-slate-700 px-2 py-0.5 text-slate-200">{{ game.genre }}</span>
          <span class="text-slate-400">{{ game.year }}</span>
          @if (game.price != null) {
          <span class="text-slate-200">{{ game.price }} €</span>
          }
        </div>
        <p class="mt-2 text-sm leading-relaxed text-slate-300 line-clamp-2">{{ game.description }}</p>
      </div>
    </div>
    }
  </div>
</section>
