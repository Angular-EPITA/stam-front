<section class="mx-auto max-w-5xl px-4 py-10">

  <div class="mb-6 flex items-center justify-between gap-4">
    <a routerLink="/" class="text-sm font-medium text-slate-300 hover:text-white">← Retour</a>

    @if (game && isAdmin()) {
      <div class="flex items-center gap-3">
        <a [routerLink]="['/admin/games', game.id, 'edit']"
          class="rounded-md bg-slate-700 px-4 py-2 text-sm font-medium text-slate-100 hover:bg-slate-600">
          Modifier
        </a>
        <button type="button" (click)="onDelete()"
          class="rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-500">
          Supprimer
        </button>
      </div>
    }
  </div>

  @if (isLoading) {
    <div class="rounded-lg bg-slate-800 p-6 text-slate-300">Chargement...</div>
  } @else if (error) {
    <div class="rounded-lg bg-slate-800 p-6 text-red-300">{{ error }}</div>
  } @else if (game) {
    <div class="grid grid-cols-1 gap-8 md:grid-cols-2">
      <div class="overflow-hidden rounded-lg bg-slate-800">
        <img class="h-80 w-full object-cover" [src]="game.imageUrl" [alt]="game.title" />
      </div>

      <div class="rounded-lg bg-slate-800 p-6">
        <h1 class="text-2xl font-bold text-slate-100">{{ game.title }}</h1>
        <div class="mt-3 flex flex-wrap items-center gap-2 text-sm">
          <span class="inline-flex items-center rounded bg-slate-700 px-2 py-0.5 text-slate-200">{{ game.genre }}</span>
          <span class="text-slate-400">{{ game.year }}</span>
          <span class="text-slate-200">{{ game.price }} €</span>
          <span class="text-slate-400">• {{ game.releaseDate }}</span>
        </div>

        <p class="mt-4 whitespace-pre-line text-slate-300">{{ game.description }}</p>
      </div>
    </div>
  }
</section>
