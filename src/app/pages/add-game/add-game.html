<section class="mx-auto max-w-3xl px-4 py-12">
  <div class="mb-8 text-center">
    <h1 class="text-3xl font-bold tracking-tight text-slate-100">Ajouter un nouveau jeu</h1>
    <p class="mt-2 text-slate-400">Remplissez le formulaire ci-dessous pour ajouter un jeu à la vitrine STAM.</p>
  </div>

  <form (ngSubmit)="onSubmit()" #gameForm="ngForm" class="rounded-lg bg-slate-800 p-6 md:p-8 shadow-lg">
    
    <div class="mb-4">
      <label class="mb-2 block text-sm font-medium text-slate-300" for="title">Titre</label>
      <input id="title" type="text" name="title" [(ngModel)]="game.title" required placeholder="Super Mario Odyssey"
        class="w-full rounded-md bg-slate-700 px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="mb-4">
      <label class="mb-2 block text-sm font-medium text-slate-300" for="description">Description</label>
      <textarea id="description" rows="4" name="description" [(ngModel)]="game.description" required placeholder="Une aventure incroyable..."
        class="w-full rounded-md bg-slate-700 px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
    </div>

    <div class="mb-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-300" for="price">Prix (€)</label>
        <input id="price" type="number" step="0.01" name="price" [(ngModel)]="game.price" required
          class="w-full rounded-md bg-slate-700 px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="mb-2 block text-sm font-medium text-slate-300" for="releaseDate">Date de sortie</label>
        <input id="releaseDate" type="date" name="releaseDate" [(ngModel)]="game.releaseDate" required
          class="w-full rounded-md bg-slate-700 px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>

    <div class="mb-6 grid grid-cols-1 gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-2 block text-sm font-medium text-slate-300" for="genreId">Genre</label>
        <select id="genreId" name="genreId" [(ngModel)]="game.genreId" required
          class="w-full rounded-md bg-slate-700 px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option [ngValue]="1">RPG</option>
          <option [ngValue]="2">Action</option>
          <option [ngValue]="3">Aventure</option>
          <option [ngValue]="4">Stratégie</option>
          <option [ngValue]="5">Sport</option>
          <option [ngValue]="6">Simulation</option>
        </select>
      </div>

      <div>
        <label class="mb-2 block text-sm font-medium text-slate-300" for="imageUrl">URL de l'image (couverture)</label>
        <input id="imageUrl" type="text" name="imageUrl" [(ngModel)]="game.imageUrl" required placeholder="https://..."
          class="w-full rounded-md bg-slate-700 px-4 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>

    <div class="mt-8 flex items-center justify-end gap-4 border-t border-slate-700 pt-4">
      <button type="button" routerLink="/"
        class="rounded-md px-4 py-2 text-sm font-medium text-slate-300 transition hover:bg-slate-700 hover:text-white">
        Annuler
      </button>
      <button type="submit" [disabled]="gameForm.invalid || isSubmitting"
        class="rounded-md bg-blue-600 px-6 py-2 text-sm font-medium text-white transition hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-50">
        {{ isSubmitting ? 'Ajout en cours...' : 'Ajouter le jeu' }}
      </button>
    </div>

  </form>
</section>
